<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Sistema Nervioso</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#eef5ff;
    padding:20px;
    text-align:center;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

.progress{
    display:flex;
    gap:5px;
    margin:20px 0;
}

.segment{
    flex:1;
    height:25px;
    background:#ddd;
    border-radius:10px;
    transition:.3s;
}

.segment.correct{
    background:#4CAF50;
}

.segment.wrong{
    background:#F44336;
}

.question{
    font-size:22px;
    margin:25px 0;
}

button{
    width:100%;
    max-width:500px;
    padding:12px;
    margin:8px auto;
    border:none;
    border-radius:10px;
    background:#1f4e79;
    color:white;
    cursor:pointer;
    font-size:17px;
    display:block;
}

button:hover{
    opacity:.9;
}

.info{
    background:#dff0ff;
    padding:20px;
    border-radius:10px;
    text-align:left;
}

.dropzone{
    border:2px dashed #777;
    border-radius:10px;
    padding:15px;
    margin:10px 0;
    cursor:pointer;
    text-align:left;
}

.selected{
    background:#4CAF50 !important;
}

.correctZone{
    background:#c8f7c5;
}

#certificate{
    background:#fff8d5;
    border:3px solid gold;
    border-radius:15px;
    padding:20px;
    text-align:left;
}

</style>
</head>
<body>

<div class="container">

<h1>🧠 Escape Room del Sistema Nervioso</h1>

<div class="progress" id="progressBar"></div>

<h3>Puntaje: <span id="score">0</span></h3>

<div id="game"></div>

</div>

<script>

let score = 0;
let level = 0;
let selectedCell = null;
let results = [];

const game = document.getElementById("game");

const levels = [

{
question:"¿Cuál es la función principal de una neurona?",
options:["Defender","Transmitir impulsos nerviosos","Producir mielina","Nutrir"],
correct:1,
info:"<p>La neurona recibe, procesa y transmite impulsos nerviosos.</p>"
},

{
question:"¿Qué parte recibe información de otras células?",
options:["Axón","Dendritas","Núcleo","Mielina"],
correct:1,
info:"<p>Las dendritas reciben señales y las conducen hacia el soma.</p>"
},

{
question:"¿Qué estructura envía el impulso nervioso?",
options:["Axón","Soma","Dendrita","Núcleo"],
correct:0,
info:"<p>El axón transmite el impulso hacia otras células.</p>"
},

{
question:"¿Qué célula brinda soporte y nutrición?",
options:["Microglía","Astrocito","Schwann","Ependimaria"],
correct:1,
info:"<p>Los astrocitos brindan soporte y nutrición.</p>"
},

{
question:"¿Qué célula produce mielina en el SNC?",
options:["Schwann","Astrocito","Oligodendrocito","Microglía"],
correct:2,
info:"<p>El oligodendrocito produce mielina en el SNC.</p>"
},

{
question:"¿Qué célula produce mielina en el SNP?",
options:["Schwann","Microglía","Astrocito","Ependimaria"],
correct:0,
info:"<p>La célula de Schwann produce mielina en el SNP.</p>"
},

{
question:"¿Cuál es la función principal de la microglía?",
options:["Defensa inmunitaria","Nutrición","Mielina","Impulsos"],
correct:0,
info:"<p>La microglía actúa como defensa del sistema nervioso.</p>"
},

{
question:"¿Qué células participan en el líquido cefalorraquídeo?",
options:["Microglía","Schwann","Ependimarias","Astrocitos"],
correct:2,
info:"<p>Las células ependimarias participan en la circulación del líquido cefalorraquídeo.</p>"
}

];

function createProgressBar(){

    const bar = document.getElementById("progressBar");

    for(let i=0;i<levels.length+1;i++){
        bar.innerHTML += `<div class="segment" id="seg${i}"></div>`;
    }
}

function updateProgress(){

    results.forEach((r,i)=>{

        // El último segmento se controla manualmente
        if(i === levels.length) return;

        let seg = document.getElementById(`seg${i}`);

        seg.classList.remove("correct","wrong");

        if(r === true) seg.classList.add("correct");
        if(r === false) seg.classList.add("wrong");

    });

}

function loadQuestion(){

    let q = levels[level];

    game.innerHTML = `
    <div class="question">${q.question}</div>

    ${q.options.map((op,i)=>
        `<button onclick="answer(${i})">${op}</button>`
    ).join("")}
    `;
}

window.answer = function(index){

    let q = levels[level];

    let correcta = index === q.correct;

    results[level] = correcta;
    updateProgress();

    if(correcta){
        score++;
        document.getElementById("score").textContent = score;
    }

    game.innerHTML = `
    <div class="info">

    <h2 style="text-align:center">
        ${correcta ? "✅ ¡Correcto!" : "❌ Incorrecto"}
    </h2>

    ${!correcta ?
    `<p><b>Respuesta correcta:</b> ${q.options[q.correct]}</p>`
    : ""}

    ${q.info}

    <br>
    <button onclick="nextLevel()">Continuar</button>

    </div>
    `;
}

window.nextLevel = function(){

    level++;

    if(level < levels.length){
        loadQuestion();
    }else{
        loadFinalGame();
    }

}

function loadFinalGame(){

game.innerHTML = `

<h2>🎯 Nivel Final</h2>

<p>Selecciona una célula y luego toca su función.</p>

<button class="cellBtn" onclick="selectCell('neurona',this)">Neurona</button>
<button class="cellBtn" onclick="selectCell('astrocito',this)">Astrocito</button>
<button class="cellBtn" onclick="selectCell('oligo',this)">Oligodendrocito</button>
<button class="cellBtn" onclick="selectCell('micro',this)">Microglía</button>
<button class="cellBtn" onclick="selectCell('schwann',this)">Schwann</button>
<button class="cellBtn" onclick="selectCell('epend',this)">Ependimaria</button>

<div class="dropzone" onclick="assign(this)" data-answer="neurona">
Transmite impulsos nerviosos
</div>

<div class="dropzone" onclick="assign(this)" data-answer="astrocito">
Soporte y nutrición neuronal
</div>

<div class="dropzone" onclick="assign(this)" data-answer="oligo">
Produce mielina en el SNC
</div>

<div class="dropzone" onclick="assign(this)" data-answer="micro">
Defensa inmunitaria
</div>

<div class="dropzone" onclick="assign(this)" data-answer="schwann">
Produce mielina en el SNP
</div>

<div class="dropzone" onclick="assign(this)" data-answer="epend">
Líquido cefalorraquídeo
</div>

<button onclick="checkFinal()">Comprobar</button>
`;
}

window.selectCell = function(id,btn){

selectedCell=id;

document.querySelectorAll(".cellBtn").forEach(b=>{
    b.classList.remove("selected");
});

btn.classList.add("selected");
}

window.assign = function(zone){

if(!selectedCell) return;

zone.innerHTML = zone.innerHTML.split("<br>")[0];
zone.innerHTML += `<br><b>➡ ${selectedCell}</b>`;
zone.dataset.selected = selectedCell;

}

window.checkFinal = function(){

let correct = 0;

document.querySelectorAll(".dropzone").forEach(z=>{

if(z.dataset.selected === z.dataset.answer){
    correct++;
    z.classList.add("correctZone");
}

});

score += correct;
document.getElementById("score").textContent = score;

// Color dinámico del último segmento según aciertos

const finalSegment = document.getElementById(`seg${levels.length}`);

// porcentaje de aciertos (0 a 1)
let ratio = correct / 6;

// Generar un color HSL:
// 0 grados = rojo
// 60 grados = amarillo
// 120 grados = verde
let hue = ratio * 120;

finalSegment.style.backgroundColor = `hsl(${hue}, 85%, 50%)`;


showCertificate();
}

function showCertificate(){

game.innerHTML = `
<div id="certificate">

<h2>🏆 Certificado</h2>

<p><b>Puntaje final:</b> ${score}</p>

<h3>¡Misión completada!</h3>

<ul>
<li>Neurona</li>
<li>Astrocito</li>
<li>Oligodendrocito</li>
<li>Microglía</li>
<li>Célula de Schwann</li>
<li>Células ependimarias</li>
</ul>

</div>
`;
}

createProgressBar();
loadQuestion();

</script>

</body>
</html>
