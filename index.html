<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actividad: Sistema Nervioso</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#eef5ff;
    margin:0;
    padding:20px;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h1{
    color:#1f4e79;
}

.progress{
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#4caf50;
    transition:.5s;
}

.question{
    margin:25px 0;
    font-size:20px;
}

button{
    padding:10px 20px;
    margin:8px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    background:#1f4e79;
    color:white;
}

button:hover{
    opacity:.9;
}

.hidden{
    display:none;
}

.info{
    background:#dff0ff;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

.dropzone{
    border:2px dashed #888;
    padding:15px;
    margin:10px;
    min-height:60px;
    border-radius:10px;
    background:#fafafa;
}

.draggable{
    background:#4caf50;
    color:white;
    padding:10px;
    margin:8px;
    border-radius:8px;
    cursor:grab;
}

.correct{
    background:#c8f7c5;
}

#certificate{
    background:#fff8d5;
    border:3px solid gold;
    padding:20px;
    border-radius:15px;
}
</style>
</head>
<body>

<div class="container">

<h1>🧠 Escape Room del Sistema Nervioso</h1>

<p>
Supera los 3 niveles para convertirte en un experto en células nerviosas.
</p>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<h3>Puntaje: <span id="score">0</span></h3>

<div id="game"></div>

</div>

<script>

let score = 0;
let level = 0;

const game = document.getElementById("game");

const levels = [

{
question:"¿Cuál es la función principal de la neurona?",
options:[
"Producir mielina",
"Transmitir impulsos nerviosos",
"Defender el tejido nervioso",
"Producir líquido cefalorraquídeo"
],
correct:1,
info:"<h3>✅ Neurona</h3><p>Su función principal es transmitir información mediante impulsos nerviosos.</p>"
},

{
question:"¿Qué parte de la neurona recibe señales de otras células?",
options:[
"Axón",
"Soma",
"Dendritas",
"Mielina"
],
correct:2,
info:"<h3>✅ Dendritas</h3><p>Las dendritas reciben señales y las conducen hacia el soma.</p>"
},

{
question:"¿Qué parte de la neurona envía los impulsos nerviosos?",
options:[
"Axón",
"Dendritas",
"Núcleo",
"Soma"
],
correct:0,
info:"<h3>✅ Axón</h3><p>El axón conduce el impulso nervioso hacia otras células.</p>"
},

{
question:"¿Qué tipo de neurona lleva información desde los receptores al sistema nervioso central?",
options:[
"Motora",
"Interneurona",
"Sensorial o sensitiva",
"Multipolar"
],
correct:2,
info:"<h3>✅ Neurona sensitiva</h3><p>Transporta información desde los receptores hacia el SNC.</p>"
},

{
question:"¿Qué tipo de neurona lleva órdenes desde el SNC hacia músculos o glándulas?",
options:[
"Motora",
"Interneurona",
"Unipolar",
"Sensorial"
],
correct:0,
info:"<h3>✅ Neurona motora</h3><p>Conduce respuestas hacia músculos y glándulas.</p>"
},

{
question:"¿Qué neurona conecta otras neuronas dentro del SNC?",
options:[
"Motora",
"Sensorial",
"Interneurona",
"Bipolar"
],
correct:2,
info:"<h3>✅ Interneurona</h3><p>Conecta neuronas entre sí dentro del SNC.</p>"
},

{
question:"¿Cuál es el tipo estructural más común de neurona?",
options:[
"Unipolar",
"Bipolar",
"Multipolar",
"Pseudopolar"
],
correct:2,
info:"<h3>✅ Multipolar</h3><p>Es la neurona más abundante en el sistema nervioso.</p>"
},

{
question:"¿Cuál es la función principal de los astrocitos?",
options:[
"Transmitir impulsos",
"Defensa inmunitaria",
"Soporte y nutrición neuronal",
"Producción de mielina"
],
correct:2,
info:"<h3>✅ Astrocitos</h3><p>Brindan soporte, nutrición y ayudan a mantener el entorno neuronal.</p>"
},

{
question:"¿Con qué estructura se relacionan los astrocitos?",
options:[
"Barrera hematoencefálica",
"Nodo de Ranvier",
"Axón",
"Ventrículos"
],
correct:0,
info:"<h3>✅ Barrera hematoencefálica</h3><p>Los astrocitos participan en su mantenimiento.</p>"
},

{
question:"¿Qué célula forma mielina en el sistema nervioso central?",
options:[
"Schwann",
"Astrocito",
"Oligodendrocito",
"Microglía"
],
correct:2,
info:"<h3>✅ Oligodendrocito</h3><p>Produce la vaina de mielina en el SNC.</p>"
},

{
question:"¿Qué célula forma mielina en el sistema nervioso periférico?",
options:[
"Microglía",
"Neurona",
"Schwann",
"Ependimaria"
],
correct:2,
info:"<h3>✅ Célula de Schwann</h3><p>Produce mielina en el SNP.</p>"
},

{
question:"¿Cuál es la principal función de la microglía?",
options:[
"Nutrir neuronas",
"Defensa inmunitaria",
"Transmitir impulsos",
"Formar mielina"
],
correct:1,
info:"<h3>✅ Microglía</h3><p>Es la célula defensiva del tejido nervioso.</p>"
},

{
question:"¿Qué proceso realiza la microglía para eliminar desechos?",
options:[
"Mitosis",
"Fotosíntesis",
"Fagocitosis",
"Ósmosis"
],
correct:2,
info:"<h3>✅ Fagocitosis</h3><p>La microglía elimina microorganismos y restos celulares.</p>"
},

{
question:"¿Dónde se encuentran las células ependimarias?",
options:[
"En los músculos",
"En los ventrículos cerebrales",
"En la piel",
"En los pulmones"
],
correct:1,
info:"<h3>✅ Ependimarias</h3><p>Recubren los ventrículos cerebrales y el conducto central de la médula espinal.</p>"
},

{
question:"¿Con qué líquido se relacionan las células ependimarias?",
options:[
"Sangre",
"Linfa",
"Líquido cefalorraquídeo",
"Plasma"
],
correct:2,
info:"<h3>✅ Líquido cefalorraquídeo</h3><p>Participan en su producción y circulación.</p>"
}

];

function updateProgress(){
let percent = (level/(levels.length+1))*100;
document.getElementById("bar").style.width = percent+"%";
}

function loadQuestion(){

updateProgress();

let q = levels[level];

game.innerHTML = `
<div class="question">${q.question}</div>
${q.options.map((op,i)=>
`<button onclick="answer(${i})">${op}</button>`
).join("")}
`;
}

window.answer = function(index){

const q = levels[level];

if(index === q.correct){
score++;
document.getElementById("score").textContent = score;
}

game.innerHTML = `
<div class="info">
${q.info}
<br><br>
<button onclick="nextLevel()">Continuar</button>
</div>
`;
}

window.nextLevel = function(){

level++;

if(level < levels.length){
loadQuestion();
}
else{
loadDragGame();
}

}

function loadDragGame(){

updateProgress();

game.innerHTML = `
<h2>🎯 Nivel Final: Relaciona cada célula con su función</h2>

<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:20px">

<div>
<div draggable="true" class="draggable" id="neurona">Neurona</div>
<div draggable="true" class="draggable" id="astrocito">Astrocito</div>
<div draggable="true" class="draggable" id="oligo">Oligodendrocito</div>
<div draggable="true" class="draggable" id="micro">Microglía</div>
<div draggable="true" class="draggable" id="schwann">Schwann</div>
<div draggable="true" class="draggable" id="epend">Ependimaria</div>
</div>

<div>
<div class="dropzone" data-answer="neurona">
Transmite impulsos nerviosos
</div>

<div class="dropzone" data-answer="astrocito">
Soporte y nutrición neuronal
</div>

<div class="dropzone" data-answer="oligo">
Mielina en SNC
</div>

<div class="dropzone" data-answer="micro">
Defensa inmunitaria
</div>

<div class="dropzone" data-answer="schwann">
Mielina en SNP
</div>

<div class="dropzone" data-answer="epend">
Circulación del líquido cefalorraquídeo
</div>
</div>

</div>

<br>
<button onclick="checkDrag()">Comprobar</button>
`;

enableDrag();
}

function enableDrag(){

let dragged = null;

document.querySelectorAll(".draggable").forEach(item=>{

item.addEventListener("dragstart",()=>{
dragged = item;
});

});

document.querySelectorAll(".dropzone").forEach(zone=>{

zone.addEventListener("dragover",(e)=>{
e.preventDefault();
});

zone.addEventListener("drop",(e)=>{
e.preventDefault();

if(zone.children.length===0){
zone.appendChild(dragged);
}
});

});

}

window.checkDrag = function(){

let correct = 0;

let feedback = `
<h3>📚 Retroalimentación del Desafío Final</h3>
<ul style="text-align:left">
`;

document.querySelectorAll(".dropzone").forEach(zone => {

    let correcta = (
        zone.children.length > 0 &&
        zone.children[0].id === zone.dataset.answer
    );

    if(correcta){
        correct++;
        zone.classList.add("correct");
    }

});

feedback += `
<li><b>Neurona:</b> transmite impulsos nerviosos mediante dendritas, soma y axón.</li>

<li><b>Astrocito:</b> proporciona soporte estructural, nutrición y participa en la barrera hematoencefálica.</li>

<li><b>Oligodendrocito:</b> produce la vaina de mielina en el Sistema Nervioso Central (SNC).</li>

<li><b>Microglía:</b> actúa como defensa inmunitaria eliminando microorganismos y desechos celulares.</li>

<li><b>Célula de Schwann:</b> forma la vaina de mielina en el Sistema Nervioso Periférico (SNP).</li>

<li><b>Célula ependimaria:</b> recubre los ventrículos cerebrales y participa en la producción y circulación del líquido cefalorraquídeo.</li>
`;

feedback += `</ul>`;

score += correct;

document.getElementById("score").textContent = score;

game.innerHTML = `
<h2>🎯 Resultado del Desafío Final</h2>

<p>
Obtuviste <b>${correct}/6</b> relaciones correctas.
</p>

${feedback}

<br>

<button onclick="showCertificate()">
Finalizar Actividad
</button>
`;

}

function showCertificate(){

updateProgress();
document.getElementById("bar").style.width = "100%";

game.innerHTML = `
<div id="certificate">

<h2>🏆 CERTIFICADO DE EXPERTO EN CÉLULAS NERVIOSAS</h2>

<p><strong>Puntaje final:</strong> ${score} puntos</p>

<hr>

<h3>Resumen del contenido aprendido</h3>

<ul style="text-align:left">
<li><b>Neurona:</b> transmite impulsos nerviosos.</li>
<li><b>Astrocito:</b> soporte y nutrición.</li>
<li><b>Oligodendrocito:</b> mielina en SNC.</li>
<li><b>Célula de Schwann:</b> mielina en SNP.</li>
<li><b>Microglía:</b> defensa inmunitaria.</li>
<li><b>Células ependimarias:</b> participan en la circulación del líquido cefalorraquídeo.</li>
<li><b>Clasificación funcional de neuronas:</b> sensitivas, motoras e interneuronas.</li>
<li><b>Clasificación estructural:</b> unipolares, bipolares y multipolares.</li>
</ul>

<hr>

<h2>¡Gracias Por Jugar!</h2>

</div>
`;
}

loadQuestion();

</script>

</body>
</html>
