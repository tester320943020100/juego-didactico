<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escape Room del Sistema Nervioso</title>

<style>

*{
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: #eef5ff;
    margin: 0;
    padding: 15px;
    text-align: center;
}

.container{
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,.15);
}

h1{
    color: #1f4e79;
}

.progress{
    width: 100%;
    height: 25px;
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
    margin: 20px 0;
}

.progress-bar{
    height: 100%;
    width: 0%;
    background: #4caf50;
    transition: .5s;
}

.question{
    margin: 25px 0;
    font-size: 22px;
}

button{
    width: 100%;
    max-width: 500px;
    padding: 14px;
    margin: 8px auto;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    background: #1f4e79;
    color: white;
    font-size: 17px;
    display: block;
}

button:hover{
    opacity: .9;
}

.info{
    background: #dff0ff;
    padding: 20px;
    border-radius: 10px;
    margin-top: 20px;
    text-align: left;
}

.dropzone{
    border: 2px dashed #777;
    padding: 15px;
    margin: 12px 0;
    border-radius: 10px;
    background: #fafafa;
    cursor: pointer;
    text-align: left;
}

.correct{
    background: #c8f7c5;
}

.selected{
    background: #4caf50 !important;
}

#certificate{
    background: #fff8d5;
    border: 3px solid gold;
    padding: 25px;
    border-radius: 15px;
    text-align: left;
}

ul{
    text-align: left;
}

@media(max-width:600px){

    .container{
        padding: 15px;
    }

    h1{
        font-size: 28px;
    }

    .question{
        font-size: 19px;
    }

}

</style>
</head>
<body>

<div class="container">

<h1>🧠 Escape Room del Sistema Nervioso</h1>

<p>
Supera todos los desafíos para convertirte en un experto en células nerviosas.
</p>

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>

<h3>Puntaje: <span id="score">0</span></h3>

<div id="game"></div>

</div>

<script>

let score = 0;
let level = 0;
let selectedCell = null;

const game = document.getElementById("game");

const levels = [

{
question:"¿Cuál es la función principal de una neurona?",
options:[
"Defender el sistema nervioso",
"Transmitir impulsos nerviosos",
"Producir mielina",
"Nutrir otras células"
],
correct:1,
info:"<h3>✅ Neurona</h3><p>Su función principal es recibir, procesar y transmitir impulsos nerviosos.</p>"
},

{
question:"¿Qué parte de la neurona recibe señales de otras células?",
options:[
"Axón",
"Dendritas",
"Mielina",
"Núcleo"
],
correct:1,
info:"<h3>✅ Dendritas</h3><p>Las dendritas reciben información y la conducen hacia el soma.</p>"
},

{
question:"¿Qué parte de la neurona envía el impulso nervioso hacia otras células?",
options:[
"Axón",
"Dendritas",
"Núcleo",
"Soma"
],
correct:0,
info:"<h3>✅ Axón</h3><p>El axón conduce el impulso nervioso hacia otras células.</p>"
},

{
question:"¿Cómo se llama el cuerpo celular de la neurona?",
options:[
"Soma",
"Axón",
"Dendrita",
"Mielina"
],
correct:0,
info:"<h3>✅ Soma</h3><p>El soma contiene el núcleo y coordina las funciones celulares.</p>"
},

{
question:"¿Qué tipo de neurona lleva información desde los receptores sensoriales al SNC?",
options:[
"Motora",
"Interneurona",
"Sensorial o sensitiva",
"Bipolar"
],
correct:2,
info:"<h3>✅ Neurona sensitiva</h3><p>Lleva información desde los órganos sensoriales al Sistema Nervioso Central.</p>"
},

{
question:"¿Qué tipo de neurona lleva órdenes desde el SNC hacia músculos o glándulas?",
options:[
"Motora",
"Interneurona",
"Sensorial",
"Multipolar"
],
correct:0,
info:"<h3>✅ Neurona motora</h3><p>Transporta respuestas desde el SNC hacia músculos y glándulas.</p>"
},

{
question:"¿Qué neurona conecta otras neuronas dentro del SNC?",
options:[
"Motora",
"Interneurona",
"Sensorial",
"Unipolar"
],
correct:1,
info:"<h3>✅ Interneurona</h3><p>Conecta neuronas entre sí dentro del Sistema Nervioso Central.</p>"
},

{
question:"¿Cuál es el tipo estructural de neurona más abundante?",
options:[
"Multipolar",
"Bipolar",
"Unipolar",
"Ninguna"
],
correct:0,
info:"<h3>✅ Multipolar</h3><p>Las neuronas multipolares son las más abundantes del sistema nervioso.</p>"
},

{
question:"¿Qué célula glial brinda soporte y nutrición a las neuronas?",
options:[
"Microglía",
"Astrocito",
"Schwann",
"Ependimaria"
],
correct:1,
info:"<h3>✅ Astrocito</h3><p>Proporciona soporte estructural y nutrición a las neuronas.</p>"
},

{
question:"¿Qué célula participa en la barrera hematoencefálica?",
options:[
"Astrocito",
"Schwann",
"Microglía",
"Oligodendrocito"
],
correct:0,
info:"<h3>✅ Astrocito</h3><p>Participa en la barrera hematoencefálica regulando el intercambio entre sangre y tejido nervioso.</p>"
},

{
question:"¿Qué célula forma la mielina en el Sistema Nervioso Central (SNC)?",
options:[
"Schwann",
"Microglía",
"Oligodendrocito",
"Astrocito"
],
correct:2,
info:"<h3>✅ Oligodendrocito</h3><p>Forma la vaina de mielina en el Sistema Nervioso Central.</p>"
},

{
question:"¿Qué célula forma la mielina en el Sistema Nervioso Periférico (SNP)?",
options:[
"Astrocito",
"Microglía",
"Oligodendrocito",
"Célula de Schwann"
],
correct:3,
info:"<h3>✅ Célula de Schwann</h3><p>Produce la mielina en el Sistema Nervioso Periférico.</p>"
},

{
question:"¿Cuál es la función principal de la microglía?",
options:[
"Nutrir neuronas",
"Defensa inmunitaria",
"Transmitir impulsos",
"Formar mielina"
],
correct:1,
info:"<h3>✅ Microglía</h3><p>Actúa como el sistema de defensa del tejido nervioso.</p>"
},

{
question:"¿Qué células recubren los ventrículos cerebrales?",
options:[
"Microglía",
"Schwann",
"Ependimarias",
"Astrocitos"
],
correct:2,
info:"<h3>✅ Células ependimarias</h3><p>Recubren los ventrículos cerebrales y el canal central de la médula espinal.</p>"
},

{
question:"¿Con qué líquido están relacionadas las células ependimarias?",
options:[
"Sangre",
"Líquido sinovial",
"Líquido cefalorraquídeo",
"Linfa"
],
correct:2,
info:"<h3>✅ Líquido cefalorraquídeo</h3><p>Las células ependimarias participan en su producción y circulación.</p>"
}

];

function updateProgress(){
    let percent = (level / (levels.length + 1)) * 100;
    document.getElementById("bar").style.width = percent + "%";
}

function loadQuestion(){

    updateProgress();

    let q = levels[level];

    game.innerHTML = `
        <div class="question">${q.question}</div>

        ${q.options.map((op,i)=>
            `<button onclick="answer(${i})">${op}</button>`
        ).join("")}
    `;
}

window.answer = function(index){

    let q = levels[level];

    let correcta = index === q.correct;

    if(correcta){
        score++;
        document.getElementById("score").textContent = score;
    }

    game.innerHTML = `
        <div class="info">

            <h2 style="text-align:center;">
                ${correcta ? "✅ ¡Correcto!" : "❌ Incorrecto"}
            </h2>

            ${
                !correcta
                ? `<p><strong>La respuesta correcta era:</strong> ${q.options[q.correct]}</p>`
                : ""
            }

            ${q.info}

            <br><br>

            <button onclick="nextLevel()">
                Continuar
            </button>

        </div>
    `;
}

window.nextLevel = function(){

    level++;

    if(level < levels.length){
        loadQuestion();
    }else{
        loadFinalGame();
    }

}

function loadFinalGame(){

    updateProgress();

    game.innerHTML = `

    <h2>🎯 Nivel Final</h2>

    <p><b>Instrucciones:</b> Presiona una célula y luego toca la función correspondiente.</p>

    <h3>Células</h3>

    <button class="cellBtn" onclick="selectCell('neurona', this)">Neurona</button>
    <button class="cellBtn" onclick="selectCell('astrocito', this)">Astrocito</button>
    <button class="cellBtn" onclick="selectCell('oligo', this)">Oligodendrocito</button>
    <button class="cellBtn" onclick="selectCell('micro', this)">Microglía</button>
    <button class="cellBtn" onclick="selectCell('schwann', this)">Célula de Schwann</button>
    <button class="cellBtn" onclick="selectCell('epend', this)">Célula ependimaria</button>

    <h3>Funciones</h3>

    <div class="dropzone" onclick="assign(this)" data-answer="neurona">
    Transmite impulsos nerviosos
    </div>

    <div class="dropzone" onclick="assign(this)" data-answer="astrocito">
    Soporte y nutrición neuronal
    </div>

    <div class="dropzone" onclick="assign(this)" data-answer="oligo">
    Produce mielina en el SNC
    </div>

    <div class="dropzone" onclick="assign(this)" data-answer="micro">
    Defensa inmunitaria del tejido nervioso
    </div>

    <div class="dropzone" onclick="assign(this)" data-answer="schwann">
    Produce mielina en el SNP
    </div>

    <div class="dropzone" onclick="assign(this)" data-answer="epend">
    Produce y moviliza líquido cefalorraquídeo
    </div>

    <br>
    <button onclick="checkFinal()">Comprobar respuestas</button>
    `;
}

window.selectCell = function(id, btn){

    selectedCell = id;

    document.querySelectorAll(".cellBtn").forEach(b=>{
        b.classList.remove("selected");
    });

    btn.classList.add("selected");
}

window.assign = function(zone){

    if(!selectedCell) return;

    zone.innerHTML = zone.innerHTML.split("<br>")[0];
    zone.innerHTML += `<br><strong>➡ ${selectedCell}</strong>`;
    zone.dataset.selected = selectedCell;
}

window.checkFinal = function(){

    let correct = 0;

    document.querySelectorAll(".dropzone").forEach(zone => {

        if(zone.dataset.selected === zone.dataset.answer){
            correct++;
            zone.classList.add("correct");
        }

    });

    score += correct;
    document.getElementById("score").textContent = score;

    game.innerHTML = `

    <h2>🎯 Resultado del Nivel Final</h2>

    <p>Obtuviste <strong>${correct}/6</strong> respuestas correctas.</p>

    <div class="info">

    <h3>📚 Retroalimentación</h3>

    <ul>
        <li><b>Neurona:</b> transmite impulsos nerviosos mediante dendritas, soma y axón.</li>

        <li><b>Astrocito:</b> proporciona soporte, nutrición y participa en la barrera hematoencefálica.</li>

        <li><b>Oligodendrocito:</b> produce la mielina en el Sistema Nervioso Central (SNC).</li>

        <li><b>Microglía:</b> actúa como defensa inmunitaria eliminando desechos y microorganismos.</li>

        <li><b>Célula de Schwann:</b> forma la mielina en el Sistema Nervioso Periférico (SNP).</li>

        <li><b>Célula ependimaria:</b> recubre ventrículos cerebrales y participa en la producción y circulación del líquido cefalorraquídeo.</li>
    </ul>

    </div>

    <button onclick="showCertificate()">Ver certificado</button>
    `;
}

window.showCertificate = function(){

    document.getElementById("bar").style.width = "100%";

    game.innerHTML = `

    <div id="certificate">

        <h2>🏆 CERTIFICADO DE CONOCIMIENTO DEL SISTEMA NERVIOSO</h2>

        <p><strong>Puntaje final:</strong> ${score} puntos</p>

        <hr>

        <h3>Contenido evaluado</h3>

        <ul>
            <li>Neurona: estructura y función.</li>
            <li>Dendritas, soma y axón.</li>
            <li>Clasificación funcional: sensitivas, motoras e interneuronas.</li>
            <li>Clasificación estructural: unipolares, bipolares y multipolares.</li>
            <li>Astrocitos.</li>
            <li>Oligodendrocitos.</li>
            <li>Microglía.</li>
            <li>Células de Schwann.</li>
            <li>Células ependimarias.</li>
            <li>Mielina en SNC y SNP.</li>
            <li>Líquido cefalorraquídeo.</li>
        </ul>

        <h2>🧠 ¡Misión completada!</h2>

    </div>
    `;
}

loadQuestion();

</script>

</body>
</html>
